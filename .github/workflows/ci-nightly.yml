name: CI Nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  season-block-smokes:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Set CI SQLite path
        run: echo "OLY_APP_SQLITE_PATH=${RUNNER_TEMP}/ci-oly-nightly.sqlite" >> "$GITHUB_ENV"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Run season block smokes
        run: |
          npm run season:smoke-block-1 2>&1 | tee block1.log
          BLOCK2_SAVE_ID=$(node -e "const fs=require('fs');const log=fs.readFileSync('block1.log','utf8');const matches=log.match(/\{[\s\S]*\}/g);if(!matches?.length) throw new Error('No JSON payload in block1.log');const payload=JSON.parse(matches[matches.length-1]);if(!payload.saveId) throw new Error('saveId missing in block1 payload');process.stdout.write(String(payload.saveId));")
          test -n "$BLOCK2_SAVE_ID"
          BLOCK2_SAVE_ID="$BLOCK2_SAVE_ID" npm run season:smoke-block-2
          BLOCK3_SAVE_ID="$BLOCK2_SAVE_ID" npm run season:smoke-block-3
