name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OLY_APP_SQLITE_PATH: ${{ runner.temp }}/ci-oly.sqlite
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run ci:flow-smoke
      - run: npm run perf:regression-smoke
      - name: Start dev server for browser smokes
        run: |
          npm run dev &
          echo $! > .dev-server.pid
      - run: npm run app:check-live -- --startup-retries 90 --startup-delay-ms 2000
      - run: npm run app:smoke-gameplay
      - name: Stop dev server
        if: always()
        run: kill "$(cat .dev-server.pid)" 2>/dev/null || true
